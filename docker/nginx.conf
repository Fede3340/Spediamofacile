# =============================================================================
# nginx.conf — Sprint 7.3
# =============================================================================
# Fronte HTTP davanti a php-fpm. Ottimizzato per container single-instance
# (Render/Fly). Reverse proxy TLS esterno (Caddy/Cloudflare) gestisce HTTPS.
# =============================================================================

user www-data;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log in stdout per raccolta log su container
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ---- Compressione -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # ---- Upload limit (coerente con php.ini post_max_size) ------------------
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # ---- Server -------------------------------------------------------------
    server {
        # Render/Fly iniettano $PORT — nginx deve usare quella.
        # Fallback 8080 se variabile non presente.
        listen ${PORT} default_server;
        listen [::]:${PORT} default_server;
        server_name _;

        root /var/www/html/public;
        index index.php index.html;

        # Health check esterno Render: risposta diretta senza passare da PHP
        # per evitare 503 se php-fpm e' lento a partire.
        location = /healthz {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","source":"nginx"}';
        }

        # Deny accesso a file sensibili (.env, composer, git, dot-files)
        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(env|log|lock|json)$ {
            deny all;
        }

        # Asset statici: cache aggressiva
        location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Laravel front controller
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;

            fastcgi_intercept_errors off;
            fastcgi_buffer_size 16k;
            fastcgi_buffers 4 16k;
            fastcgi_read_timeout 60s;
            internal;
        }

        # Blocca PHP diretti in sottocartelle (sicurezza)
        location ~ \.php$ {
            return 404;
        }
    }
}
