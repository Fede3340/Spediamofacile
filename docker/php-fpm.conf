; ============================================================================
; php-fpm.conf — Sprint 7.3
; ============================================================================
; Pool worker dinamico, dimensionato per Render starter (512MB RAM).
; Log in stderr → raccolti dal container runtime.
; ============================================================================

[www]
user = www-data
group = www-data

; Ascolta su TCP (nginx -> 127.0.0.1:9000)
listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

; Pool dinamico — ogni worker ~30-60MB con opcache
pm = dynamic
pm.max_children = 15
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

; Log errori in stderr (raccolto da Docker)
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null

; Limiti worker
request_terminate_timeout = 90s

; Passa env vars utili (APP_KEY, DB_*, ecc.) — clear_env=no e' necessario
; perche' Render inietta le envvar nel processo principale
clear_env = no
