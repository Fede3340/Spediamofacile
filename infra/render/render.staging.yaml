# =============================================================================
# render.staging.yaml — W6.1 Staging Environment
# =============================================================================
# Blueprint Render ambiente STAGING, separato da production.
# Branch trigger: `staging` (oppure tag `staging-*`).
# Nessuna PR preview (previews solo su prod).
# Dati: DB anonimizzato da prod via scripts/anonymize-db-for-staging.sh.
# Servizi esterni: tutti in modalita' TEST (Stripe test, BRT sandbox, Resend sandbox).
# =============================================================================

previews:
  generation: off  # niente preview automatiche su staging

services:
  # ---------------------------------------------------------------------------
  # Backend Laravel — STAGING
  # ---------------------------------------------------------------------------
  - type: web
    name: spedizionefacile-staging-api
    env: docker
    plan: starter  # starter minimo per evitare cold start, risparmio vs prod
    region: frankfurt
    rootDir: .
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    branch: staging  # deploy solo da branch staging

    healthCheckPath: /api/health/live

    buildFilter:
      paths:
        - app/**
        - routes/**
        - config/**
        - database/**
        - bootstrap/**
        - public/**
        - composer.json
        - composer.lock
        - Dockerfile
        - docker-entrypoint.sh

    envVars:
      # ---- Applicazione -----------------------------------------------------
      - key: APP_ENV
        value: staging
      - key: APP_DEBUG
        value: "false"  # staging mimica prod, debug off
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://staging.spediamofacile.it
      - key: APP_TIMEZONE
        value: Europe/Rome
      - key: APP_LOCALE
        value: it
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: debug  # staging: piu' verboso per QA

      # ---- Database (Postgres managed — istanza staging dedicata) ----------
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: spedizionefacile-staging-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: spedizionefacile-staging-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: spedizionefacile-staging-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: spedizionefacile-staging-db
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: spedizionefacile-staging-db
          property: password

      # ---- Cache / Queue / Session -----------------------------------------
      # Staging: cache=array (memory), session=database, queue=sync (no worker).
      # Motivazione: risparmio infra (no Redis), staging e' low-traffic, job
      # sincroni sono accettabili per smoke test.
      - key: CACHE_STORE
        value: array
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync  # job eseguiti inline, no coda
      - key: ENABLE_QUEUE_WORKER
        value: "false"

      # ---- Sanctum / CORS --------------------------------------------------
      - key: SANCTUM_STATEFUL_DOMAINS
        value: staging.spediamofacile.it
      - key: CORS_ALLOWED_ORIGINS
        value: https://staging.spediamofacile.it

      # ---- Email (Resend sandbox) -------------------------------------------
      # Resend supporta dominio sandbox: onboarding@resend.dev → solo test
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.resend.com
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USERNAME
        value: resend
      - key: MAIL_PASSWORD
        sync: false  # RE_API_KEY staging da dashboard Render
      - key: MAIL_ENCRYPTION
        value: ssl
      - key: MAIL_FROM_ADDRESS
        value: staging-noreply@spediamofacileaccount.com

      # ---- BRT sandbox -----------------------------------------------------
      - key: BRT_CLIENT_ID
        sync: false  # credenziali sandbox BRT da dashboard
      - key: BRT_PASSWORD
        sync: false
      - key: BRT_API_URL
        value: https://api.brt.it/rest/v1/shipments-test  # endpoint sandbox
      - key: BRT_PUDO_API_URL
        value: https://api.brt.it
      - key: BRT_PUDO_TOKEN
        sync: false
      - key: BRT_DEPARTURE_DEPOT
        value: "0"
      - key: BRT_VERIFY_SSL
        value: "true"

      # ---- Stripe TEST keys ------------------------------------------------
      # Chiavi sk_test_* / pk_test_*. Card test: 4242 4242 4242 4242.
      - key: STRIPE_KEY
        sync: false  # pk_test_*
      - key: STRIPE_SECRET
        sync: false  # sk_test_*
      - key: STRIPE_WEBHOOK_SECRET
        sync: false  # whsec_* distinto da prod

      # ---- Sentry staging --------------------------------------------------
      - key: SENTRY_LARAVEL_DSN
        sync: false  # progetto Sentry 'spedizionefacile-staging'
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "1.0"  # staging: traccia 100% per debug

  # ---------------------------------------------------------------------------
  # Frontend Nuxt — STAGING
  # ---------------------------------------------------------------------------
  - type: web
    name: spedizionefacile-staging-web
    env: node
    plan: starter
    region: frankfurt
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    startCommand: node .output/server/index.mjs
    autoDeploy: true
    branch: staging
    healthCheckPath: /
    buildFilter:
      paths:
        - apps/web/**
    envVars:
      - key: NODE_ENV
        value: production  # build ottimizzata, ma NUXT_PUBLIC_ENV=staging
      - key: NUXT_PUBLIC_ENV
        value: staging
      - key: NUXT_PUBLIC_API_BASE
        value: https://staging.spediamofacile.it  # stesso host, routing interno
      - key: NUXT_PUBLIC_STRIPE_KEY
        sync: false  # pk_test_* (client-side)
      - key: NUXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: NUXT_PUBLIC_SENTRY_ENVIRONMENT
        value: staging

databases:
  # Staging DB: istanza separata, tier minimo (hobby).
  # Popolamento: via scripts/anonymize-db-for-staging.sh + psql restore.
  - name: spedizionefacile-staging-db
    databaseName: spedizionefacile_staging
    user: spedizionefacile_staging
    plan: starter  # starter minimo, staging non richiede backup managed
    region: frankfurt

# -----------------------------------------------------------------------------
# NO Redis in staging: CACHE_STORE=array + QUEUE_CONNECTION=sync.
# Risparmio ~10 USD/mese. Se serve Redis per test specifici → aggiungere
# blocco `redises:` identico a prod ma name `spedizionefacile-staging-redis`.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# NO cron backup: staging DB e' rigenerato on-demand da prod dump anonimizzato.
# -----------------------------------------------------------------------------
