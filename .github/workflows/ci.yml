name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Laravel backend (PHP 8.3 + PostgreSQL 15)
  # ─────────────────────────────────────────────────────────────
  laravel:
    name: Laravel (PHP ${{ matrix.php }} + PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: laravel
          POSTGRES_DB: laravel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laravel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Backend Laravel sta alla ROOT del repo (non più apps/api).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_pgsql, gd, redis, intl, bcmath, mbstring, xml, zip, curl
          coverage: xdebug
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create test .env
        run: |
          cat > .env <<'EOF'
          APP_NAME=SpedizioneFacile
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          BCRYPT_ROUNDS=4
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=laravel_test
          DB_USERNAME=laravel
          DB_PASSWORD=laravel
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          CACHE_STORE=array
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          EOF

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run Laravel Pint (code style)
        run: composer lint

      - name: Run PHPStan (static analysis)
        run: composer analyse

      - name: Run tests with coverage
        run: php artisan test --parallel --coverage-clover coverage.xml
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: laravel

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: backend
          name: laravel-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 2: Nuxt build + typecheck + lint
  # ─────────────────────────────────────────────────────────────
  nuxt-build:
    name: Nuxt build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node: ['22']

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NUXT_PUBLIC_API_BASE: http://localhost

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-output
          path: apps/web/.output
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # Job 3: Playwright E2E (depends on nuxt-build)
  # ─────────────────────────────────────────────────────────────
  playwright:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: nuxt-build

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chrome]

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download Nuxt build
        uses: actions/download-artifact@v4
        with:
          name: nuxt-output
          path: apps/web/.output

      - name: Start Nuxt preview
        run: |
          node .output/server/index.mjs > nuxt-preview.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3000 >/dev/null && exit 0
            sleep 1
          done
          cat nuxt-preview.log
          exit 1
        env:
          PORT: 3000
          NUXT_PUBLIC_API_BASE: http://localhost

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }} --reporter=github,html
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: apps/web/playwright-report
          retention-days: 14

      - name: Upload visual regression diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs-${{ matrix.project }}
          path: |
            apps/web/test-results/**/*-diff.png
            apps/web/test-results/**/*-actual.png
            apps/web/test-results/**/*-expected.png
          retention-days: 14
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Job 4: Security audit (composer + npm)
  # ─────────────────────────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Composer audit
        run: composer audit --no-interaction --format=plain
        continue-on-error: true

      - name: npm audit
        working-directory: apps/web
        run: npm audit --audit-level=high
        continue-on-error: true
