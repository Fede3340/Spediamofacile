name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [develop]
  schedule:
    # Daily staging refresh at 04:00 UTC
    - cron: '0 4 * * *'

concurrency:
  group: deploy-${{ github.event.inputs.target || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Staging deploy (auto su develop, manual, scheduled)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
    environment:
      name: staging
      url: https://staging.spedizionefacile.it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, gd, redis, intl, bcmath
          tools: composer:v2

      - name: Build Laravel (composer install no-dev)
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-progress --no-interaction

      - name: Install Nuxt deps
        working-directory: apps/web
        run: npm ci --prefer-offline --no-audit

      - name: Build Nuxt .output/
        working-directory: apps/web
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NUXT_PUBLIC_API_BASE: ${{ secrets.STAGING_API_BASE }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Build Laravel Docker image
        run: docker build -f Dockerfile -t spedizionefacile-api:staging-${{ github.sha }} .

      - name: Trigger Render deploy (Laravel API)
        if: secrets.RENDER_DEPLOY_HOOK_STAGING != ''
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

      - name: Trigger Render deploy (Nuxt SSR)
        if: secrets.RENDER_DEPLOY_HOOK_NUXT_STAGING != ''
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_NUXT_STAGING }}"

      - name: Upload Nuxt sourcemaps to Sentry
        if: secrets.SENTRY_AUTH_TOKEN != ''
        working-directory: apps/web
        run: |
          npx @sentry/cli releases new "${{ github.sha }}"
          npx @sentry/cli releases files "${{ github.sha }}" upload-sourcemaps .output/public --url-prefix "~/"
          npx @sentry/cli releases finalize "${{ github.sha }}"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Sentry release notify
        if: hashFiles('scripts/deploy-notify-sentry.sh') != ''
        run: bash scripts/deploy-notify-sentry.sh staging "${{ github.sha }}"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Wait for staging warmup
        run: sleep 30

      - name: Smoke test /api/health
        run: |
          curl -fsSL --retry 5 --retry-delay 10 "https://staging.spedizionefacile.it/api/health" || exit 1

  # ─────────────────────────────────────────────────────────────
  # Production deploy (manual + approval)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    environment:
      name: production
      url: https://spedizionefacile.it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, gd, redis, intl, bcmath
          tools: composer:v2

      - name: Build Laravel (production)
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-progress --no-interaction

      - name: Install Nuxt deps
        working-directory: apps/web
        run: npm ci --prefer-offline --no-audit

      - name: Build Nuxt production bundle
        working-directory: apps/web
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NUXT_PUBLIC_API_BASE: ${{ secrets.PRODUCTION_API_BASE }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Trigger Render deploy (Laravel API prod)
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}"

      - name: Trigger Render deploy (Nuxt SSR prod)
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_NUXT_PROD }}"

      - name: Upload sourcemaps to Sentry (prod)
        working-directory: apps/web
        run: |
          npx @sentry/cli releases new "${{ github.sha }}"
          npx @sentry/cli releases files "${{ github.sha }}" upload-sourcemaps .output/public --url-prefix "~/"
          npx @sentry/cli releases finalize "${{ github.sha }}"
          npx @sentry/cli releases deploys "${{ github.sha }}" new -e production
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Wait for production warmup
        run: sleep 45

      - name: Smoke test production
        id: smoke
        run: |
          curl -fsSL --retry 5 --retry-delay 10 "https://spedizionefacile.it/api/health" || exit 1

  # ─────────────────────────────────────────────────────────────
  # Rollback on smoke fail (prod only)
  # ─────────────────────────────────────────────────────────────
  rollback-production:
    name: Rollback production
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure() && needs.deploy-production.result == 'failure'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render rollback
        run: |
          echo "Smoke test failed — triggering rollback"
          curl -fsSL -X POST "${{ secrets.RENDER_ROLLBACK_HOOK_PROD }}"

      - name: Notify Sentry of rollback
        if: secrets.SENTRY_AUTH_TOKEN != ''
        run: |
          npx @sentry/cli releases deploys "${{ github.sha }}" new -e production -s "rollback"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
